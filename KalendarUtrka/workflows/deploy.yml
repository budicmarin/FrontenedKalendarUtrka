name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Putanja do package-lock.json unutar podmape
          cache-dependency-path: './KalendarUtrka/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: ./KalendarUtrka # VAŽNO: ulazi u podmapu

      - name: Build
        run: npm run build
        working-directory: ./KalendarUtrka # VAŽNO: ulazi u podmapu

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite builda u dist mapu unutar KalendarUtrka
          path: ./KalendarUtrka/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4